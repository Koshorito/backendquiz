# Project Configuration
spring.application.name=demo
server.port=8000

# MySQL Database Connection
# Note: Ensure you have access to this IP address (192.168.103.200)
spring.datasource.url=jdbc:mysql://localhost:3306/hr?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=170280
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
# 'update' automatically creates new tables (Location, Country, Region)
# and adds new columns to the Department table.
spring.jpa.hibernate.ddl-auto=update

# SQL Logging - Helpful for verifying the JOINs in your new API
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Platform
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect